apiVersion: vcpe.dev/v1
kind: Deployment
metadata:
  name: dual-gateway
  labels:
    scenario: dual-gateway
spec:
  maxReplicasPerService: 3
  maxActiveDeployments: 10

  # Network topology – two gateways sharing one BNG (docs/containers.drawio):
  #
  #   [internet / host]
  #        |
  #   mgmt (10.10.10.0/24)       ── BNG eth0, WebPA eth0
  #        |
  #   wan-7 (10.107.200.0/24)    ── BNG eth1  (DHCP server, no VLAN)
  #        |                           gateway-7 erouter0 (DHCP client)
  #   cm-7  (10.107.201.0/24)    ── BNG eth2  (DHCP server)
  #        |                           gateway-7 wan0
  #   lan-7-p1 (192.168.10.0/24) ── gateway-7 brlan0, client-7 eth0
  #   lan-7-p2 (192.168.20.0/24) ── gateway-7 (unused port)
  #   lan-7-p3 (192.168.30.0/24) ── gateway-7 (unused port)
  #   lan-7-p4 (192.168.40.0/24) ── gateway-7 (unused port)
  #
  #   wan-9 (10.178.200.0/24)    ── BNG eth3  (DHCP server, VLAN 1081)
  #        |                           gateway-9 erouter0.1081 (DHCP client)
  #   cm-9  (10.178.201.0/24)    ── BNG eth4  (DHCP server)
  #        |                           gateway-9 wan0
  #   lan-9-p1 (192.168.110.0/24) ── gateway-9 brlan0, client-9 eth0
  #   lan-9-p2 (192.168.120.0/24) ── gateway-9 (unused port)
  #   lan-9-p3 (192.168.130.0/24) ── gateway-9 (unused port)
  #   lan-9-p4 (192.168.140.0/24) ── gateway-9 (unused port)

  networks:
    # ── shared management ───────────────────────────────────────────────────
    - role: mgmt
      ipv4:
        cidr: 10.10.10.0/24
        gateway: 10.10.10.1
        pool: { start: 10.10.10.10, end: 10.10.10.250 }

    # ── customer 7: standard WAN/CM (no VLAN) ───────────────────────────────
    - role: wan-7
      nat: true
      firewall: true
      ipv4:
        cidr: 10.107.200.0/24
        gateway: 10.107.200.1
        pool: { start: 10.107.200.10, end: 10.107.200.250 }

    - role: cm-7
      ipv4:
        cidr: 10.107.201.0/24
        gateway: 10.107.201.1
        pool: { start: 10.107.201.10, end: 10.107.201.250 }

    # gateway-7 LAN ports
    - role: lan-7-p1
      ipv4:
        cidr: 192.168.10.0/24
        gateway: 192.168.10.1
        pool: { start: 192.168.10.10, end: 192.168.10.250 }

    - role: lan-7-p2
      ipv4:
        cidr: 192.168.20.0/24
        gateway: 192.168.20.1
        pool: { start: 192.168.20.10, end: 192.168.20.250 }

    - role: lan-7-p3
      ipv4:
        cidr: 192.168.30.0/24
        gateway: 192.168.30.1
        pool: { start: 192.168.30.10, end: 192.168.30.250 }

    - role: lan-7-p4
      ipv4:
        cidr: 192.168.40.0/24
        gateway: 192.168.40.1
        pool: { start: 192.168.40.10, end: 192.168.40.250 }

    # ── customer 9: VLAN 1081 WAN ───────────────────────────────────────────
    - role: wan-9
      nat: true
      firewall: true
      ipv4:
        cidr: 10.178.200.0/24
        gateway: 10.178.200.1
        pool: { start: 10.178.200.10, end: 10.178.200.250 }

    - role: cm-9
      ipv4:
        cidr: 10.178.201.0/24
        gateway: 10.178.201.1
        pool: { start: 10.178.201.10, end: 10.178.201.250 }

    # gateway-9 LAN ports
    - role: lan-9-p1
      ipv4:
        cidr: 192.168.110.0/24
        gateway: 192.168.110.1
        pool: { start: 192.168.110.10, end: 192.168.110.250 }

    - role: lan-9-p2
      ipv4:
        cidr: 192.168.120.0/24
        gateway: 192.168.120.1
        pool: { start: 192.168.120.10, end: 192.168.120.250 }

    - role: lan-9-p3
      ipv4:
        cidr: 192.168.130.0/24
        gateway: 192.168.130.1
        pool: { start: 192.168.130.10, end: 192.168.130.250 }

    - role: lan-9-p4
      ipv4:
        cidr: 192.168.140.0/24
        gateway: 192.168.140.1
        pool: { start: 192.168.140.10, end: 192.168.140.250 }

  services:
    # ── BNG ─────────────────────────────────────────────────────────────────
    # Single BNG serves DHCP on all WAN/CM segments for both gateways.
    - name: bng
      type: bng
      replicas: 1
      image:
        repository: ghcr.io/gdcs-dev/bng
        tag: dev
        pullPolicy: build-if-missing
        buildContext: services/bng
      interfaces:
        - { role: mgmt }
        - { role: wan-7, defaultRoute: true }
        - { role: cm-7 }
        - { role: wan-9 }
        - { role: cm-9 }
      config:
        access:
          - role: wan-7
            dhcp4:
              subnet: 10.107.200.0/24
              ranges:
                - { start: 10.107.200.100, end: 10.107.200.200 }
              options:
                routers: 10.107.200.1
              leaseSeconds: 3600
          - role: cm-7
            dhcp4:
              subnet: 10.107.201.0/24
              ranges:
                - { start: 10.107.201.100, end: 10.107.201.200 }
              options:
                routers: 10.107.201.1
              leaseSeconds: 3600
          - role: wan-9
            dhcp4:
              subnet: 10.178.200.0/24
              ranges:
                - { start: 10.178.200.100, end: 10.178.200.200 }
              options:
                routers: 10.178.200.1
              leaseSeconds: 3600
          - role: cm-9
            dhcp4:
              subnet: 10.178.201.0/24
              ranges:
                - { start: 10.178.201.100, end: 10.178.201.200 }
              options:
                routers: 10.178.201.1
              leaseSeconds: 3600

    # ── WebPA / WebConfig ────────────────────────────────────────────────────
    - name: webpa
      type: webpa
      replicas: 1
      image:
        repository: ghcr.io/gdcs-dev/webpa
        tag: dev
        pullPolicy: build-if-missing
        buildContext: services/webpa
      interfaces:
        - { role: mgmt }
      dependsOn:
        - bng

    # ── gateway-7 ────────────────────────────────────────────────────────────
    # Customer 7: standard erouter0 (no VLAN), LAN 192.168.10.0/24.
    - name: gateway-7
      type: gateway
      replicas: 1
      image:
        repository: ghcr.io/gdcs-dev/gateway
        tag: dev
        pullPolicy: build-if-missing
        buildContext: services/gateway
      interfaces:
        - { role: wan-7 }
        - { role: cm-7 }
        - { role: lan-7-p1 }
        - { role: lan-7-p2 }
        - { role: lan-7-p3 }
        - { role: lan-7-p4 }
      config:
        erouter:
          wanRole: wan-7
          cmRole: cm-7
          lanPrefix: lan-7-p
        lan:
          ipv4: 192.168.10.1/24
          dhcpStart: 192.168.10.100
          dhcpEnd: 192.168.10.200
      dependsOn:
        - bng

    # ── gateway-9 ────────────────────────────────────────────────────────────
    # Customer 9: erouter0.1081 (VLAN 1081 on erouter0), LAN 192.168.110.0/24.
    - name: gateway-9
      type: gateway
      replicas: 1
      image:
        repository: ghcr.io/gdcs-dev/gateway
        tag: dev
        pullPolicy: build-if-missing
        buildContext: services/gateway
      interfaces:
        - { role: wan-9 }
        - { role: cm-9 }
        - { role: lan-9-p1 }
        - { role: lan-9-p2 }
        - { role: lan-9-p3 }
        - { role: lan-9-p4 }
      config:
        erouter:
          wanRole: wan-9
          cmRole: cm-9
          lanPrefix: lan-9-p
          vlan: 1081
        lan:
          ipv4: 192.168.110.1/24
          dhcpStart: 192.168.110.100
          dhcpEnd: 192.168.110.200
      dependsOn:
        - bng

    # ── client-7 ─────────────────────────────────────────────────────────────
    # Alpine client behind gateway-7 on LAN port 1.
    - name: client-7
      type: generic-container
      replicas: 1
      image:
        repository: docker.io/library/alpine
        tag: "3.19"
        pullPolicy: always-pull
      interfaces:
        - { role: lan-7-p1 }
      config:
        command: ["/bin/sh", "-c", "ip addr flush dev eth0 && udhcpc -f -i eth0"]
      dependsOn:
        - gateway-7

    # ── client-9 ─────────────────────────────────────────────────────────────
    # Alpine client behind gateway-9 on LAN port 1.
    - name: client-9
      type: generic-container
      replicas: 1
      image:
        repository: docker.io/library/alpine
        tag: "3.19"
        pullPolicy: always-pull
      interfaces:
        - { role: lan-9-p1 }
      config:
        command: ["/bin/sh", "-c", "ip addr flush dev eth0 && udhcpc -f -i eth0"]
      dependsOn:
        - gateway-9
