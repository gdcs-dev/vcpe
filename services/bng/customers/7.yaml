customer_id: 7
attachments:
  - network: mgmt
    interface: eth0
    mac: 02:10:00:00:00:07
  - network: wan
    interface: eth1
    mac: 02:20:00:00:00:07
  - network: cm
    interface: eth2
    mac: 02:30:00:00:00:07
management:
  ipv4: 10.10.10.107/24
  ipv6: 2001:dbf:0:1::107/64
access:
  - interface: eth1
    network: wan
    ipv4: 10.107.200.1/24
    ipv6: 2001:dae:7:1::129/64
    radvd:
      send_advert: true
      managed_flag: true
      other_config_flag: false
      default_lifetime: 240
      min_delay_between_ras: 3
      min_rtr_adv_interval: 120
      max_rtr_adv_interval: 180
  - interface: eth2
    network: cm
    ipv4: 10.107.201.1/24
    ipv6: 2001:daf:7:1::129/64
    radvd:
      send_advert: true
      managed_flag: true
      other_config_flag: false
      default_lifetime: 240
      min_delay_between_ras: 3
      min_rtr_adv_interval: 120
      max_rtr_adv_interval: 180
nat_ipv4_cidrs:
  - 10.107.200.0/24
  - 10.107.201.0/24
template_replacements:
  - file: etc/dhcp/dhcpd.conf
    pattern: 10\.100\.200\.
    replacement: 10.107.200.
  - file: etc/dhcp/dhcpd.conf
    pattern: 10\.100\.201\.
    replacement: 10.107.201.
  - file: etc/dhcp/dhcpd6.conf
    pattern: 2001:dae:0:1
    replacement: 2001:dae:7:1
  - file: etc/dhcp/dhcpd6.conf
    pattern: 2001:daf:0:1
    replacement: 2001:daf:7:1