# Standalone / development compose for the bng service type.
# vcpe up uses a renderer-generated compose.yaml from the operation artifacts
# directory — this file is NOT invoked by the normal vcpe workflow.
#
# To use standalone: copy a compose.env from the operation artifacts dir
# (or generate one manually) into this directory, then run:
#   podman compose -f services/bng/compose.yaml up -d
services:
  bng:
    image: ${IMAGE}
    container_name: ${DEPLOYMENT_NAME}-${SERVICE_NAME}
    hostname: ${SERVICE_NAME}
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - compose.env
    volumes:
      - ./runtime:/runtime-config:ro
    networks:
      mgmt:
        mac_address: ${IFACE_MGMT_MAC}
        ipv4_address: ${IFACE_MGMT_IPV4}
      wan:
        mac_address: ${IFACE_WAN_MAC}
        ipv4_address: ${IFACE_WAN_IPV4}
      cm:
        mac_address: ${IFACE_CM_MAC}
        ipv4_address: ${IFACE_CM_IPV4}

networks:
  mgmt:
    external: true
    name: ${IFACE_MGMT_NETWORK}
  wan:
    external: true
    name: ${IFACE_WAN_NETWORK}
  cm:
    external: true
    name: ${IFACE_CM_NETWORK}
