# Curated compose for the bng service type. The control plane renders a
# compose.env in this directory before `up`, populating the canonical
# IFACE_<ROLE>_* contract plus DEPLOYMENT_NAME/SERVICE_NAME/IMAGE. All instance
# data (image, container name, MACs, networks) comes from that env file; this
# file contains no customer- or deployment-specific literals.
services:
  bng:
    image: ${IMAGE}
    container_name: ${DEPLOYMENT_NAME}-${SERVICE_NAME}
    hostname: ${SERVICE_NAME}
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - compose.env
    volumes:
      - ./runtime:/runtime-config:ro
    networks:
      mgmt:
        mac_address: ${IFACE_MGMT_MAC}
        ipv4_address: ${IFACE_MGMT_IPV4}
      wan:
        mac_address: ${IFACE_WAN_MAC}
        ipv4_address: ${IFACE_WAN_IPV4}
      cm:
        mac_address: ${IFACE_CM_MAC}
        ipv4_address: ${IFACE_CM_IPV4}

networks:
  mgmt:
    external: true
    name: ${IFACE_MGMT_NETWORK}
  wan:
    external: true
    name: ${IFACE_WAN_NETWORK}
  cm:
    external: true
    name: ${IFACE_CM_NETWORK}
