# NATS server config for the Oktopus standalone container.
# TLS is disabled by default. To enable TLS, mount your own cert/key/CA files
# and set NATS_ENABLE_TLS=true in oktopus.env.
server_name: oktopus-nats
port: 4222
http_port: 8222

authorization: {
    users: [
        {user: $NATS_USER, password: $NATS_PW}
    ]
}

# JetStream — persistent storage for USP messages.
jetstream {
    store_dir: "/var/lib/nats/jetstream"
}
