build: v0.4.32
health:
  custom:
    server: themis
  disableLogging: false
log:
  errorOutputPaths:
    - stdout
  level: INFO
  outputPaths:
    - stdout
prometheus:
  defaultNamespace: xmidt
  defaultSubsystem: themis
server: webpa
servers:
  claims:
    address: :6502
    disableHTTPKeepAlives: true
    header:
      X-Midt-Server:
        - themis
      X-Midt-Version:
        - development
  health:
    address: :6504
    disableHTTPKeepAlives: true
    header:
      X-Midt-Server:
        - themis
      X-Midt-Version:
        - development

  issuer:
    address: :6501
    disableHTTPKeepAlives: true
    header:
      X-Midt-Server:
        - themis
      X-Midt-Version:
        - development
  key:
    address: :6500
    disableHTTPKeepAlives: true
    header:
      X-Midt-Server:
        - themis
      X-Midt-Version:
        - development
  metrics:
    address: :6503
    disableHTTPKeepAlives: true
stage: development
token:
  alg: RS256
  claims:
    - header: X-Midt-Mac-Address
      key: mac
      parameter: mac
    - header: X-Midt-Serial-Number
      key: serial
      parameter: serial
    - header: X-Midt-Uuid
      key: uuid
      parameter: uuid
    - key: iss
      value: themis
    - key: trust
      value: 1000
    - key: sub
      value: client-supplied
    - key: aud
      value: XMiDT
    - key: capabilities
      value:
        - x1:issuer:test:.*:all
  duration: 24h
  key:
    bits: 1024
    kid: development
    type: rsa
  metadata:
    - header: X-Midt-Mac-Address
      key: mac
      parameter: mac
    - header: X-Midt-Serial-Number
      key: serial
      parameter: serial
    - header: X-Midt-Uuid
      key: uuid
      parameter: uuid
  nonce: true
  notBeforeDelta: -15s
  partnerID:
    claim: partner-id
    default: comcast
    header: X-Midt-Partner-ID
    parameter: pid
tracing:
  provider: noop
