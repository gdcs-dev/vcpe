# event-sink compose service definition.
# compose.env is generated by vcpe apply (same pattern as services/webpa/).

services:
  event-sink:
    image: ${IMAGE}
    container_name: ${DEPLOYMENT_NAME}-${SERVICE_NAME}
    hostname: ${SERVICE_NAME}
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - compose.env
    environment:
      # DNS: use BNG dnsmasq so container hostnames resolve correctly.
      # IFACE_MGMT_GATEWAY4 is populated in compose.env by vcpe apply.
      BNG_DNS_SERVER: "${IFACE_MGMT_GATEWAY4}"
      ARGUS_URL: "http://argus:6600"
      # Base64-encoded "user:pass" — matches dev Argus config in argus.yaml
      ARGUS_BASIC_AUTH: "dXNlcjpwYXNz"
      WEBHOOK_URL: "http://${SERVICE_NAME}:8080/webhook"
      # Caduceus strips the "event:" scheme before matching, so the regex
      # matches against "apparmor/{severity}/mac:..." (no event: prefix).
      WEBHOOK_EVENTS_REGEX: "apparmor/.*"
      WEBHOOK_DEVICE_MATCHER: ".*"
      # Change this in production; stable value required across restarts
      WEBHOOK_SECRET: "vcpe-dev-webhook-secret"
      LISTEN_ADDR: ":8080"
    ports: []
    networks:
      mgmt:
        mac_address: ${IFACE_MGMT_MAC}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  mgmt:
    external: true
    name: ${IFACE_MGMT_NETWORK}
